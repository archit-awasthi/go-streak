version: "3.8"

services:

  # ── Go Streak App (Nginx serving the built SPA) ──────────────────
  go-streak:
    image: architawasthi77/go-streak:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-streak-app
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - monitoring

  # ── Nginx Prometheus Exporter ─────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://go-streak:80/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - go-streak
    restart: unless-stopped
    networks:
      - monitoring

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  grafana-data:
